services:
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  remotion:
    build:
      context: .
      dockerfile: docker/remotion/Dockerfile
    volumes:
      - ./storage/app/public/videos:/data/videos
      - ./public/Montserrat-Black.ttf:/app/public/Montserrat-Black.ttf:ro
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  redis-data:
