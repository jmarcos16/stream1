services:
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  remotion:
    build:
      context: .
      dockerfile: docker/remotion/Dockerfile
    volumes:
      - /home/jmarcos16/stream1/storage/app/public/videos:/data/videos
      - /home/jmarcos16/stream1/public/Montserrat-Black.ttf:/app/public/Montserrat-Black.ttf:ro
    entrypoint: ["tail", "-f", "/dev/null"]

volumes:
  redis-data:
